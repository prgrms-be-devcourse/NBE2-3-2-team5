spring.application.name=Festimo

# MariaDB setting
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3307/festimo
spring.datasource.username=root
spring.datasource.password=!123456

# Hibernate setting
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# JWT setting
spring.jwt.secret=vmfhaltmskdlstkfkdgodyroqkfwkdbalroqkfwkdbalaaaaaaaaaaaaaaaabbbbb
spring.jwt.refresh-expiration=36000000
spring.jwt.access-expiration=3600000

# logging setting
logging.level.org.springframework.security=DEBUG

# Swagger setting
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

# Thymeleaf setting
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# 정적 리소스 설정
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/static/**

# cache setting
spring.cache.type=simple

# 파일 업로드 설정
file.upload-dir=src/main/resources/static/uploads

# Redis setting
spring.redis.host=localhost
spring.redis.port=6379